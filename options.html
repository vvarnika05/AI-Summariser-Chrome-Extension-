<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body {
        font-family: Arial, sans-serif;
        padding: 20px;
        max-width: 600px;
        margin: 0 auto;
      }
      h1 {
        color: #4285f4;
      }
      .form-group {
        margin-bottom: 20px;
      }
      label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
      }
      input[type="text"] {
        width: 100%;
        padding: 8px;
        box-sizing: border-box;
        border: 1px solid #ddd;
        border-radius: 4px;
      }
      button {
        background-color: #4285f4;
        color: white;
        border: none;
        padding: 10px 15px;
        border-radius: 4px;
        cursor: pointer;
      }
      button:hover {
        background-color: #3367d6;
      }
      .success-message {
        color: green;
        margin-top: 10px;
        display: none;
      }

    </style>
    <title>Extensions Options</title>
</head>
<body>
    <h1>AI SUMMARY SETTINGS</h1>
    <div>
    <form class="form-group">
        <label for="api-key">Gemini API Key</label>
        <input type="text" name="" id="api-key" placeholder="Enter your gemini api key"/>

        <p>
            You can get your Gemini API Key from
            <a href="https://makersuite.google.com/app/apikey" target="_blank">Google AI Studio</a>
        </p>
        </form>
    </div>
    <button id="save-button">Save Settings</button>
    <p id="success-message" class="success-message">
        Settings saved successfully!
    </p>    
    <script src="options.js"></script>
</body>
</html>
